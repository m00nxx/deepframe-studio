    output_constraints: Same dimensions as input.

  - id: avs.mctemporaldenoise
    name: MCTemporalDenoise
    engine: avisynth
    category: degrain
    description: Legacy AviSynth+ degrain script for compatibility workflows.
    recommended: true
    required_plugins: ["MCTemporalDenoise.avsi", "AviSynth+ dependencies"]
    install_status: manual
    install_policy: manual
    install_allowed: false
    install_method: Manual install only unless all dependency licenses are clear.
    source_url: http://avisynth.nl/index.php/MCTemporalDenoise
    license_status: manual_review
    license_notes: Legacy scripts often have mixed dependency licensing.
    cpu_gpu_notes: 64-bit AviSynth+ first; 32-bit bridge is roadmap.
    parameters:
      - name: settings
        type: enum
        default: medium
        options: [low, medium, high]
        label: Preset
        description: Legacy preset controlling denoise aggressiveness.
    defaults: { settings: medium }
    script_templates:
      avisynth: "clip = MCTemporalDenoise(clip, settings=\"{settings}\")"
    input_constraints: AviSynth+ source clip.
    output_constraints: Same dimensions as input.

  - id: vs.deblock_qed
    name: Deblock QED
    engine: vapoursynth
