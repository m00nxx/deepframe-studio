    recommended: true
    required_plugins: []
    install_status: installed
    install_policy: builtin
    install_allowed: false
    install_method: Built into VapourSynth std/resize color workflows.
    source_url: https://www.vapoursynth.com/doc/
    license_status: built_in
    license_notes: Available with VapourSynth installation.
    cpu_gpu_notes: CPU, fast.
    parameters:
      - name: saturation
        type: float
        default: 1.0
        min: 0.0
        max: 2.0
        step: 0.05
        label: Saturation
        description: Saturation multiplier scaffold.
    defaults: { saturation: 1.0 }
    script_template: "# Color tweak scaffold: saturation={saturation}"
    input_constraints: Color family handling required before real render.
    output_constraints: Same dimensions as input.

  - id: vs.f3kdb
    name: f3kdb Deband
    engine: vapoursynth
    category: deband
    description: Widely used debanding plugin metadata.
    recommended: true
    required_plugins: ["f3kdb"]
    install_status: missing
    install_policy: manual
    install_allowed: false
    install_method: Manual install until redistribution terms are verified.
    source_url: https://github.com/HomeOfVapourSynthEvolution/VapourSynth-neo_f3kdb
