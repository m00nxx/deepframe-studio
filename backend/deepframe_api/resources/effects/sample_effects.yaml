effects:
  - id: vs.knlmeanscl
    name: KNLMeansCL Denoise
    engine: vapoursynth
    category: denoise
    description: OpenCL denoise pass for modern VapourSynth workflows.
    recommended: true
    required_plugins: ["KNLMeansCL"]
    install_status: missing
    install_policy: manual
    install_allowed: false
    install_method: Manual install from upstream release.
    source_url: https://github.com/Khanattila/KNLMeansCL
    download_url: ""
    license_status: manual_review
    license_notes: Verify upstream binary/script license before redistribution.
    cpu_gpu_notes: OpenCL GPU preferred; CPU fallback depends on OpenCL runtime.
    parameters:
      - name: strength
        type: float
        default: 1.2
        min: 0.0
        max: 5.0
        step: 0.1
        label: Strength
        description: Main denoise amount. Higher values clean more noise but can soften fine detail.
    defaults: { strength: 1.2 }
    script_template: "clip = core.knlm.KNLMeansCL(clip, d=1, a=2, s={strength})"
    input_constraints: 8-16 bit YUV/RGB clips depending on plugin build.
    output_constraints: Same dimensions as input.

  - id: vs.bm3d
    name: BM3D Denoise
    engine: vapoursynth
    category: denoise
    description: High quality block-matching denoise, slower than KNLMeansCL.
    recommended: true
    required_plugins: ["BM3D", "fmtconv or zimg-compatible format conversion"]
    install_status: missing
    install_policy: manual
    install_allowed: false
    install_method: Manual install until binary/source licensing is reviewed.
    source_url: https://github.com/HomeOfVapourSynthEvolution/VapourSynth-BM3D
    license_status: manual_review
    license_notes: Metadata reference only; do not bundle until reviewed.
    cpu_gpu_notes: CPU-heavy; use on short ranges or cached preview.
    parameters:
      - name: sigma
        type: float
        default: 3.0
        min: 0.0
        max: 20.0
        step: 0.1
        label: Sigma
        description: Noise standard deviation estimate; higher removes more noise.
    defaults: { sigma: 3.0 }
    script_template: "clip = core.resize.Bicubic(clip, format=vs.YUV444PS)\nclip = core.bm3d.Basic(clip, sigma={sigma})\nclip = core.resize.Bicubic(clip, format=vs.YUV420P8)"
    input_constraints: Converts subsampled clips to YUV444 float for BM3D preview.
    output_constraints: Same dimensions as input.

  - id: vs.qtgmc
    name: QTGMC Deinterlace
    engine: vapoursynth
    category: deinterlace
    description: High quality motion-compensated deinterlacing script.
    recommended: true
    required_plugins: ["QTGMC script", "mvtools", "nnedi3/eedi3 optional dependencies"]
    install_status: manual
    install_policy: manual
    install_allowed: false
    install_method: Manual script/plugin installation; dependencies vary by build.
    source_url: https://github.com/HomeOfVapourSynthEvolution/havsfunc
    license_status: manual_review
    license_notes: Mixed script/plugin dependencies require review.
    cpu_gpu_notes: CPU-heavy; preview should use short cached ranges.
    parameters:
      - name: preset
        type: enum
        default: Slower
        options: [Draft, Fast, Medium, Slow, Slower]
        label: Preset
        description: Quality/speed preset.
    defaults: { preset: Slower }
    script_imports: ["import havsfunc"]
    script_template: "clip = havsfunc.QTGMC(clip, TFF=True, Preset='{preset}', EdiMode='EEDI3')"
    input_constraints: Interlaced source clips.
    output_constraints: Progressive output, often doubled frame rate depending settings.

  - id: vs.cas
    name: CAS Sharpen
    engine: vapoursynth
    category: sharpen
    description: Contrast Adaptive Sharpening style enhancement.
    recommended: true
    required_plugins: ["CAS or compatible script"]
    install_status: missing
    install_policy: manual
    install_allowed: false
    install_method: Manual install from reviewed script/plugin source.
    source_url: https://github.com/HomeOfVapourSynthEvolution
    license_status: manual_review
    license_notes: Confirm exact implementation license before bundling.
    cpu_gpu_notes: Usually CPU; lightweight compared to denoise.
    parameters:
      - name: sharpness
        type: float
        default: 0.5
        min: 0.0
        max: 1.0
        step: 0.05
        label: Sharpness
        description: Sharpening amount.
    defaults: { sharpness: 0.5 }
    script_template: "clip = core.cas.CAS(clip, sharpness={sharpness})"
    input_constraints: Progressive clip recommended.
    output_constraints: Same dimensions as input.

  - id: vs.std.boxblur
    name: Box Blur
    engine: vapoursynth
    category: blur
    description: Simple built-in blur scaffold for masks and repair workflows.
    recommended: true
    required_plugins: []
    install_status: installed
    install_policy: builtin
    install_allowed: false
    install_method: Built into VapourSynth standard filters.
    source_url: https://www.vapoursynth.com/doc/functions/video/boxblur.html
    license_status: built_in
    license_notes: Available with VapourSynth installation.
    cpu_gpu_notes: CPU, fast.
    parameters:
      - name: hradius
        type: int
        default: 1
        min: 1
        max: 16
        step: 1
        label: Radius
        description: Horizontal blur radius.
    defaults: { hradius: 1 }
    script_template: "clip = core.std.BoxBlur(clip, hradius={hradius}, vradius={hradius})"
    input_constraints: Any VapourSynth clip.
    output_constraints: Same dimensions as input.

  - id: vs.resize.bicubic
    name: Bicubic Resize
    engine: vapoursynth
    category: resize
    description: Built-in VapourSynth resize operation.
    recommended: true
    required_plugins: []
    install_status: installed
    install_policy: builtin
    install_allowed: false
    install_method: Built into VapourSynth core resize API.
    source_url: https://www.vapoursynth.com/doc/functions/video/resize.html
    license_status: built_in
    license_notes: Available with VapourSynth installation.
    cpu_gpu_notes: CPU, fast.
    parameters:
      - name: width
        type: int
        default: 1920
        min: 16
        max: 16384
        step: 2
        label: Width
        unit: px
        description: Output frame width in pixels.
      - name: height
        type: int
        default: 1080
        min: 16
        max: 16384
        step: 2
        label: Height
        unit: px
        description: Output frame height in pixels.
    defaults: { width: 1920, height: 1080 }
    script_template: "clip = core.resize.Bicubic(clip, width={width}, height={height})"
    input_constraints: Any VapourSynth clip.
    output_constraints: Requested output dimensions.

  - id: ai.realesrgan
    name: Real-ESRGAN Upscale
    engine: vapoursynth
    category: upscale
    description: Metadata scaffold for future Real-ESRGAN adapter.
    recommended: true
    required_plugins: ["Real-ESRGAN adapter", "model files"]
    install_status: missing
    install_policy: metadata_only
    install_allowed: false
    install_method: Future optional model manager; no automatic model download in MVP.
    source_url: https://github.com/xinntao/Real-ESRGAN
    license_status: manual_review
    license_notes: Models/code licenses must be reviewed separately before installer support.
    cpu_gpu_notes: CUDA/PyTorch GPU preferred; CPU fallback can be very slow.
    parameters:
      - name: scale
        type: enum
        default: 2x
        options: [2x, 4x]
        label: Scale
        description: Target upscale factor.
    defaults: { scale: 2x }
    script_template: "# Real-ESRGAN adapter scaffold: scale={scale}"
    input_constraints: Progressive clip; color conversion may be required.
    output_constraints: Upscaled dimensions.

  - id: vs.dehalo_alpha
    name: DeHalo Alpha
    engine: vapoursynth
    category: repair
    description: Halo repair script metadata for edge artifacts.
    recommended: true
    required_plugins: ["havsfunc or compatible DeHalo_alpha script"]
    install_status: manual
    install_policy: manual
    install_allowed: false
    install_method: Manual script install after license/dependency review.
    source_url: https://github.com/HomeOfVapourSynthEvolution/havsfunc
    license_status: manual_review
    license_notes: Script dependencies need review before bundling.
    cpu_gpu_notes: CPU; moderate cost.
    parameters:
      - name: rx
        type: float
        default: 2.0
        min: 1.0
        max: 4.0
        step: 0.1
        label: Radius
        description: Horizontal halo search radius.
    defaults: { rx: 2.0 }
    script_imports: ["import havsfunc"]
    script_template: "clip = havsfunc.DeHalo_alpha(clip, rx={rx})"
    input_constraints: Progressive clip recommended.
    output_constraints: Same dimensions as input.

  - id: vs.deshake.scaffold
    name: Stabilize Scaffold
    engine: vapoursynth
    category: stabilize
    description: Placeholder for future stabilization adapter/plugin metadata.
    recommended: false
    required_plugins: ["future stabilization adapter"]
    install_status: missing
    install_policy: metadata_only
    install_allowed: false
    install_method: Roadmap only; no installer in MVP.
    source_url: ""
    license_status: unclear
    license_notes: Select implementation before enabling installation.
    cpu_gpu_notes: CPU/GPU depends on chosen engine.
    parameters:
      - name: strength
        type: float
        default: 0.5
        min: 0.0
        max: 1.0
        step: 0.05
        label: Strength
        description: Future stabilization strength.
    defaults: { strength: 0.5 }
    script_template: "# Stabilization scaffold: strength={strength}"
    input_constraints: Future adapter.
    output_constraints: Future adapter.

  - id: vs.tweak
    name: Tweak Color
    engine: vapoursynth
    category: color
