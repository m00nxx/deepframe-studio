    input_constraints: Progressive source recommended.
    output_constraints: Increased frame count.

  - id: vs.encode.scaffold
    name: Encode H.264 Scaffold
    engine: vapoursynth
    category: encode
    description: Metadata placeholder for final export encoding handled by the FFmpeg adapter.
    recommended: true
    required_plugins: ["configured FFmpeg binary"]
    install_status: manual
    install_policy: metadata_only
    install_allowed: false
    install_method: Configure FFmpeg in settings; encoding is not executed by the effect chain.
    source_url: https://ffmpeg.org/
    license_status: manual_review
    license_notes: FFmpeg binary license depends on build configuration; do not bundle silently.
    cpu_gpu_notes: CPU encode; NVENC detection is separate roadmap.
    parameters:
      - name: crf
        type: int
        default: 18
        min: 0
        max: 35
        step: 1
        label: CRF
        description: Lower is higher quality/larger files.
    defaults: { crf: 18 }
    script_template: "# Encode preset handled by FFmpeg export: crf={crf}"
    input_constraints: Final export stage.
    output_constraints: Encoded file.

  - id: custom.vpy
